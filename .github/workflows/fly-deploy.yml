# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/

name: Fly Deploy
on:
  push:
    branches:
      - master
  workflow_dispatch: # allow manual deploys from the Actions tab
jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group # optional: ensure only one action runs at a time
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
        # fly.toml is gitignored (config lives in `fly secrets`); the committed
        # fly.toml.example carries the non-secret app config CI deploys with.
      - run: flyctl deploy --remote-only --ha=false --config fly.toml.example
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
